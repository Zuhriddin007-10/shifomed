{% extends 'base.html' %}

{% block content %}
<div style="max-width:1100px; margin:40px auto; padding:0 20px;">
    <h2>Shifokorlar</h2>
    <div style="display:flex; flex-wrap:wrap; gap:24px; margin-top:24px;">
        {% for doctor in doctors %}
        <div style="background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:24px; width:280px;">
            {% if doctor.image %}
            <img src="{{ doctor.image.url }}" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            {% else %}
            <div style="width:80px; height:80px; border-radius:50%; background:#E1F5EE; display:flex; align-items:center; justify-content:center; font-size:32px;">
                <i class="fa-solid fa-user-doctor" style="color:#1D9E75;"></i>
            </div>
            {% endif %}
            <h3 style="margin:12px 0 4px;">Dr. {{ doctor.name }}</h3>
            <p style="color:#666; margin:0;">{{ doctor.department.name }}</p>
            <a href="/doctor/{{ doctor.id }}/" style="display:inline-block; margin-top:16px; padding:8px 20px; background:#1D9E75; color:#fff; border-radius:8px; text-decoration:none;">Qabulga yozilish</a>
        </div>
        {% empty %}
        <p>Shifokorlar topilmadi.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
